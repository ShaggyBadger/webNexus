{% extends "admin/base_site.html" %}

{% block content %}
  <div style="margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px;">
    <h1 style="margin: 0;">ATG Review Queue</h1>
    <a href="{% url 'admin:atg_veederticket_changelist' %}" class="button">Back to Veeder Tickets</a>
  </div>

  <div style="border: 1px solid #ddd; background: #fff; height: calc(100vh - 240px); min-height: 680px;">
    <iframe
      src="{{ review_queue_url }}"
      style="width: 100%; height: 100%; border: 0;"
      title="ATG Review Queue"
      loading="eager"
    ></iframe>
  </div>
{% endblock %}
