<header>
    <div class="command-bar">
        <!-- Left Side: Brand as Home -->
        <a href="{% url 'homepage:homepage' %}" class="command-brand" title="{{ SITE_NAME }}">[ TJP // OPS ]</a>
        
        <nav class="d-flex align-items-center command-nav">
            <span class="command-bracket">[</span>
            {% include 'feedback/includes/feedback_button.html' %}
            <span class="command-separator">/</span>
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile' %}" class="command-link-compact">PROFILE</a>
                <span class="command-separator">/</span>
                <a href="{% url 'accounts:logout' %}" class="command-link-compact">LOGOUT</a>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="command-link-compact">LOGIN</a>
            {% endif %}
            <span class="command-bracket">]</span>
        </nav>
    </div>
</header>
