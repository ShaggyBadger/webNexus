{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WebNexus{% endblock %}</title>
    <!-- Google Fonts - Lora -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Custom CSS (for site-wide config like fonts, colors) -->
    <style>
        :root {
            --primary-blue: #4092ff; /* A slightly brighter blue for dark theme */
            --background-dark: #212529; /* Dark background */
            --text-light-gray: #f8f9fa; /* Light text for dark background */
            --text-muted-light-gray: #adb5bd; /* Muted light text */
        }

        body {
            font-family: 'Lora', serif; /* Using Lora font */
            background-color: var(--background-dark);
            color: var(--text-light-gray);
        }

        /* Example: Apply primary blue to links */
        a {
            color: var(--primary-blue);
        }

        a:hover {
            color: #1a75ff; /* A darker shade of your blue for hover */
        }

        /* Override Bootstrap primary color for consistency if needed */
        .btn-primary {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
            color: white !important; /* Ensure text is visible on blue background */
            transition: background-color 0.2s ease-in-out, border-color 0.2s ease-in-out;
        }

        .btn-primary:hover {
            background-color: #1a75ff;
            border-color: #1a75ff;
        }

        .text-primary-blue {
            color: var(--primary-blue) !important;
        }
        /* Add more site-wide styles here */
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}
        <!-- Default content if none is provided by child templates -->
        {% endblock %}
    </div>

    <!-- Bootstrap JS and its dependencies -->
    <script src="{% static 'homepage/js/bootstrap/bootstrap.bundle.min.js' %}"></script>
    {% block extra_js %}{% endblock %}

    <footer class="bg-dark text-center py-4 mt-5">
        <div class="container">
            <p class="text-muted-light-gray mb-2">Stay tuned for updates and new features!</p>
            <div class="social-icons">
                <!-- Placeholder for social media icons -->
                <a href="#" class="text-muted-light-gray mx-2"><i class="fab fa-twitter"></i></a>
                <a href="#" class="text-muted-light-gray mx-2"><i class="fab fa-github"></i></a>
                <a href="#" class="text-muted-light-gray mx-2"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </footer>
</body>
</html>
