{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="user-map-preference" content="{{ USER_MAP_PREFERENCE }}">
    <title>{% block title %}{{ SITE_NAME }}{% endblock %}</title>

    <!-- Mobile-Specific Meta Tags (iOS / Android) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121417">
    <meta name="apple-mobile-web-app-title" content="WebNexus">

    <!-- Favicon & Mobile App Icon -->
    <link rel="icon" type="image/png" href="{% static 'images/swtoEagle.png' %}">
    <link rel="apple-touch-icon" href="{% static 'images/solidEagleColor.jpeg' %}">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Slab:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap/css/bootstrap.min.css' %}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        :root {
            --primary-color: {{ PRIMARY_COLOR }};
            --bg-color: {{ BG_COLOR }};
            --text-color: {{ TEXT_COLOR }};
            --muted-text-color: {{ MUTED_TEXT_COLOR }};
            --accent-color: {{ ACCENT_COLOR }};
            --navbar-bg: {{ NAVBAR_BG }};
            --navbar-border: {{ NAVBAR_BORDER }};
        }

        body {
            font-family: {{ FONT_FAMILY|safe }};
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 32px; /* For fixed bar */
        }

        /* Tactical Command Bar (Custom replacement for Navbar) */
        .command-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 32px;
            background-color: var(--navbar-bg);
            border-bottom: 1px solid var(--navbar-border);
            z-index: 1100;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            justify-content: space-between;
        }

        .command-link-compact {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted-text-color);
            text-decoration: none;
            transition: color 0.2s ease;
            padding: 0 4px;
        }

        .command-link-compact:hover {
            color: var(--primary-color);
        }

        .command-bracket, .command-separator {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--navbar-border);
            user-select: none;
        }

        .command-brand {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--muted-text-color);
            text-decoration: none;
        }

        .command-brand:hover {
            color: var(--text-color);
        }

        /* Override Bootstrap Primary with Tactical Olive */
        .text-primary { color: var(--primary-color) !important; }
        .border-primary { border-color: var(--primary-color) !important; }
        .bg-primary { background-color: var(--primary-color) !important; }

        /* Tactical Utility Colors */
        .text-tactical-success { color: #50fa7b !important; }
        .text-tactical-warning { color: #ffb86c !important; }
        .text-tactical-danger { color: #ff5555 !important; }

        footer {
            margin-top: auto;
            background-color: var(--navbar-bg);
            border-top: 1px solid var(--navbar-border);
        }
        
        .text-muted-custom {
            color: var(--muted-text-color);
        }

        .mono {
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
        }

        .social-link {
            color: var(--muted-text-color);
            font-size: 1.2rem;
            transition: color 0.2s ease, transform 0.2s ease;
            display: inline-block;
        }

        .social-link:hover {
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        main {
            flex-grow: 1;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include 'components/navbar.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include 'components/footer.html' %}

    <!-- Bootstrap JS Bundle -->
    <script src="{% static 'css/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <!-- Tactical GPS Module -->
    <script src="{% static 'js/tactical_gps.js' %}"></script>
    <!-- Field Intel Module -->
    <script src="{% static 'js/field_intel.js' %}"></script>
    <script>
        /**
         * TACTICAL TILE LAYER PROVIDER
         * Respects user map preference globally.
         */
        window.getTacticalTileLayer = function(L) {
            const preference = document.querySelector('meta[name="user-map-preference"]')?.content || 'STANDARD';
            
            if (preference === 'DARK') {
                return L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap contributors © CARTO',
                    subdomains: 'abcd',
                    maxZoom: 20
                });
            }
            
            return L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            });
        };
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
