{% if user.is_authenticated %}
<div class="col-12 col-md-6 mb-3" id="fuel-rack-module">
  <div class="card bg-dark-custom border-secondary h-100 tactical-card command-app-card accent-primary">
    <div class="card-body d-flex flex-column">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h2 class="h4 mb-0 fw-bold mono command-app-title">FUEL RACK TRACKER</h2>
        <div class="d-flex align-items-center gap-2">
          <span class="badge mono command-app-tag command-app-tag-core">CORE</span>
          <div id="rack-status-indicator" class="mono small rack-status-indicator">
              <span id="rack-status-dot" class="rack-status-dot">●</span> <span id="rack-status-text">INITIALIZING...</span>
          </div>
        </div>
      </div>
      <p id="rack-nearest-display" class="mono text-muted-custom small mb-4 flex-grow-1">
        SCANNING FOR NEAREST RACK...
      </p>
      <div class="d-grid gap-2">
        <button id="rack-checkin-btn" class="btn btn-sm mono fw-bold command-app-cta command-app-cta-primary" disabled>
          RECORD CHECK-IN
        </button>
        <a href="{% url 'siteintel:rack_list' %}" class="btn btn-dark btn-sm mono text-muted-custom rack-manual-link">
          MANUAL SELECTION / VIEW ALL
        </a>
      </div>
    </div>
  </div>
</div>
{% endif %}
