{% if user.is_authenticated %}
<div class="col-12 col-md-6 mb-3" id="fuel-rack-module">
  <div class="card bg-dark-custom border-secondary h-100 tactical-card" style="border-left-color: #ffb86c;">
    <div class="card-body d-flex flex-column">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h2 class="h4 mb-0 fw-bold mono" style="color: #ffb86c;">FUEL RACK TRACKER</h2>
        <div id="rack-status-indicator" class="mono small" style="display: none;">
            <span id="rack-status-dot" style="color: grey;">●</span> <span id="rack-status-text">INITIALIZING...</span>
        </div>
      </div>
      <p id="rack-nearest-display" class="mono text-muted-custom small mb-4 flex-grow-1">
        SCANNING FOR NEAREST RACK...
      </p>
      <div class="d-grid gap-2">
        <button id="rack-checkin-btn" class="btn btn-outline-warning btn-sm mono fw-bold" disabled>
          RECORD CHECK-IN
        </button>
        <a href="{% url 'siteintel:rack_list' %}" class="btn btn-dark btn-sm mono text-muted-custom" style="font-size: 0.7rem; border: 1px solid #333;">
          MANUAL SELECTION / VIEW ALL
        </a>
      </div>    </div>
  </div>
</div>
{% endif %}
